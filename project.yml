name: trackme
options:
  bundleIdPrefix: com.parmscript
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 7654L3CX5L
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 11
    VERSIONING_SYSTEM: apple-generic
targets:
  trackme:
    type: application
    platform: iOS
    sources:
      - path: trackme
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parmscript.trackme
        PRODUCT_NAME: trackme
        INFOPLIST_FILE: trackme/Info.plist
        CODE_SIGN_ENTITLEMENTS: trackme/trackme.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
      configs:
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_COMPILATION_MODE: wholemodule
    scheme:
      testTargets:
        - trackmeTests
  trackmeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: trackmeTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: trackme
